services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: open-memory-api
    command: >
      uv run gunicorn
      --bind "0.0.0.0:${API_PORT}"
      --workers ${SERVER_WORKER_AMOUNT:-1}
      --worker-class ${SERVER_WORKER_CLASS:-gevent}
      --worker-connections ${SERVER_WORKER_CONNECTIONS:-10}
      --timeout ${GUNICORN_TIMEOUT:-360}
      "app:create_app('production')"
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      - FLASK_APP=app
      - FLASK_ENV=production
      - DATABASE_URL=postgresql+psycopg://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_DATABASE}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - LLM_MODEL_API_KEY=${LLM_MODEL_API_KEY}
      - LLM_MODEL_BASE_URL=${LLM_MODEL_BASE_URL}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME}
      - EMBEDDING_MODEL_API_KEY=${EMBEDDING_MODEL_API_KEY}
      - EMBEDDING_MODEL_BASE_URL=${EMBEDDING_MODEL_BASE_URL}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION}
      - API_AUTH_TOKEN=${API_AUTH_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - open-memory-network

  worker-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: open-memory-worker-beat
    command: uv run celery -A app.celery beat --loglevel=info
    environment:
      - FLASK_APP=app
      - DATABASE_URL=postgresql+psycopg://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_DATABASE}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - LLM_MODEL_API_KEY=${LLM_MODEL_API_KEY}
      - LLM_MODEL_BASE_URL=${LLM_MODEL_BASE_URL}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME}
      - EMBEDDING_MODEL_API_KEY=${EMBEDDING_MODEL_API_KEY}
      - EMBEDDING_MODEL_BASE_URL=${EMBEDDING_MODEL_BASE_URL}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - open-memory-network

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: open-memory-worker
    command: uv run celery -A app.celery worker --loglevel=info
    environment:
      - FLASK_APP=app
      - DATABASE_URL=postgresql+psycopg://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_DATABASE}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME}
      - LLM_MODEL_API_KEY=${LLM_MODEL_API_KEY}
      - LLM_MODEL_BASE_URL=${LLM_MODEL_BASE_URL}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME}
      - EMBEDDING_MODEL_API_KEY=${EMBEDDING_MODEL_API_KEY}
      - EMBEDDING_MODEL_BASE_URL=${EMBEDDING_MODEL_BASE_URL}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION}
      - API_AUTH_TOKEN=${API_AUTH_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - open-memory-network

  postgres:
    image: pgvector/pgvector:pg15
    container_name: open-memory-postgres
    command: >
      postgres -c 'max_connections=${POSTGRES_MAX_CONNECTIONS:-100}'
               -c 'shared_buffers=${POSTGRES_SHARED_BUFFERS:-128MB}'
               -c 'work_mem=${POSTGRES_WORK_MEM:-4MB}'
               -c 'maintenance_work_mem=${POSTGRES_MAINTENANCE_WORK_MEM:-64MB}'
               -c 'effective_cache_size=${POSTGRES_EFFECTIVE_CACHE_SIZE:-4096MB}'
               -c 'statement_timeout=${POSTGRES_STATEMENT_TIMEOUT:-0}'
               -c 'idle_in_transaction_session_timeout=${POSTGRES_IDLE_IN_TRANSACTION_SESSION_TIMEOUT:-0}'
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - open-memory-network

  redis:
    image: redis:7-alpine
    container_name: open-memory-redis
    volumes:
      - ./volumes/redis:/data
    networks:
      - open-memory-network

networks:
  open-memory-network:
    driver: bridge
