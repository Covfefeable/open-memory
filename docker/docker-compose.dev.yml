services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: open-memory-postgres-dev
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_DATABASE}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - open-memory-dev-network

  redis:
    image: redis:7-alpine
    container_name: open-memory-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis:/data
    networks:
      - open-memory-dev-network

networks:
  open-memory-dev-network:
    driver: bridge
